name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Generar la tarjeta de estadísticas generales
      - name: Generate Overview Stats
        uses: stats-organization/github-readme-stats-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: stats
          path: generated/overview.svg
          options: theme=radical&show_icons=true&count_private=true

      # 2. Generar la tarjeta de lenguajes más usados
      - name: Generate Top Languages
        uses: stats-organization/github-readme-stats-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: top-langs
          path: generated/languages.svg
          options: theme=radical&layout=compact&count_private=true

      # 3. Guardar los cambios e impactar en el repositorio
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p generated
          git add generated/
          git commit -m "chore: update github stats [skip ci]" || exit 0
          git push origin main